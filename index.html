

<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Em Breve | Estúdio Escrita Planejada</title>

<meta name="description"
content="Estamos preparando algo novo. Em breve esta página estará disponível.">

<meta name="robots"
content="index,follow,max-image-preview:large">

<meta name="theme-color"
content="#FFFFFF">

<link rel="preconnect"
href="https://fonts.googleapis.com">

<link rel="preconnect"
href="https://fonts.gstatic.com"
crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=League+Spartan:wght@700;800&display=swap"
rel="stylesheet">

<style>

:root{

--azul:#2A7F98;
--roxo:#8E44AD;
--coral:#FF9F43;

--branco:#FFFFFF;

--texto:#0F172A;
--texto2:#475569;

--bg:
linear-gradient(
135deg,
#F8FAFC 0%,
#EEF2FF 100%
);

--grad:
linear-gradient(
135deg,
#FF9F43 0%,
#DE2F74 100%
);

--sombra:
0 24px 80px rgba(15,23,42,.08);

}

*{
margin:0;
padding:0;
box-sizing:border-box;
}

html{

-webkit-text-size-adjust:100%;

}

body{

font-family:"Inter",sans-serif;

background:
radial-gradient(
circle at top left,
rgba(142,68,173,.06),
transparent 35%
),

radial-gradient(
circle at bottom right,
rgba(42,127,152,.06),
transparent 40%
),

var(--bg);

min-height:100vh;

display:flex;

align-items:center;

justify-content:center;

padding:24px;

overflow:hidden;

}

.card{

width:min(920px,100%);

background:
rgba(255,255,255,.88);

backdrop-filter:
blur(16px);

border:

1px solid
rgba(255,255,255,.7);

border-radius:

32px;

padding:

80px
48px;

text-align:center;

box-shadow:

var(--sombra);

position:relative;

overflow:hidden;

}

.card::before{

content:"";

position:absolute;

top:-160px;
right:-160px;

width:320px;
height:320px;

border-radius:50%;

background:

radial-gradient(
circle,
rgba(142,68,173,.10),
transparent
);

}

.card::after{

content:"";

position:absolute;

bottom:-180px;
left:-180px;

width:360px;
height:360px;

border-radius:50%;

background:

radial-gradient(
circle,
rgba(42,127,152,.08),
transparent
);

}

.tag{

display:inline-flex;

align-items:center;

justify-content:center;

padding:

12px
18px;

border-radius:

999px;

background:

rgba(255,159,67,.08);

color:

var(--coral);

font-size:.82rem;

font-weight:700;

text-transform:uppercase;

letter-spacing:.08em;

margin-bottom:34px;

position:relative;

z-index:2;

}

h1{

font-family:

"League Spartan",
sans-serif;

font-size:

clamp(
3.5rem,
10vw,
7rem
);

line-height:.9;

letter-spacing:

-.05em;

color:

var(--texto);

margin-bottom:

24px;

position:relative;

z-index:2;

}

h1 span{

background:

var(--grad);

-webkit-background-clip:text;

-webkit-text-fill-color:transparent;

background-clip:text;

}

.subtitle{

max-width:680px;

margin:

0 auto;

font-size:

1.18rem;

line-height:

1.9;

color:

var(--texto2);

position:relative;

z-index:2;

}

.divider{

width:110px;

height:6px;

border-radius:999px;

background:

var(--grad);

margin:

42px auto 0;

position:relative;

z-index:2;

}

.footer{

margin-top:

24px;

font-size:

.95rem;

color:

#64748B;

position:relative;

z-index:2;

}

@media(max-width:768px){

.card{

padding:

60px
28px;

border-radius:

24px;

}

.subtitle{

font-size:

1.04rem;

}

}

</style>

</head>

<body>

<main class="card">

<div class="tag">
Estúdio Escrita Planejada
</div>

<h1>
EM <span>BREVE</span>
</h1>

<p class="subtitle">
Estamos preparando algo novo.<br>
Esta página está em construção e será publicada em breve.
</p>

<div class="divider"></div>

<p class="footer">
© Estúdio Escrita Planejada
</p>

</main>

</body>
</html>
