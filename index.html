<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Estúdio Escrita Planejada | Em Breve</title>

<meta name="description" content="Novos lançamentos em breve no Estúdio Escrita Planejada.">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Barlow Condensed',sans-serif;
    background:#111;
    color:#fff;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    text-align:center;
    overflow:hidden;
}

body::before{
    content:"";
    position:fixed;
    inset:0;
    background:
        radial-gradient(circle at top,#1f5eff33 0%,transparent 45%),
        radial-gradient(circle at bottom,#00d9ff18 0%,transparent 50%),
        linear-gradient(135deg,#0d0d0d,#1b1b1b);
    z-index:-2;
}

body::after{
    content:"";
    position:fixed;
    inset:0;
    background-image:
        linear-gradient(rgba(255,255,255,.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,.03) 1px, transparent 1px);
    background-size:50px 50px;
    z-index:-1;
}

.container{
    max-width:800px;
    padding:50px 30px;
}

.logo{
    font-size:3rem;
    font-weight:700;
    letter-spacing:2px;
    text-transform:uppercase;
    margin-bottom:15px;
}

.line{
    width:80px;
    height:4px;
    background:#2d8cff;
    margin:20px auto 40px;
}

h1{
    font-size:4rem;
    text-transform:uppercase;
    margin-bottom:20px;
}

p{
    font-size:1.5rem;
    color:#d9d9d9;
    line-height:1.6;
}

footer{
    margin-top:70px;
    font-size:.95rem;
    color:#888;
    letter-spacing:1px;
}

@media(max-width:768px){

.logo{
    font-size:2rem;
}

h1{
    font-size:2.5rem;
}

p{
    font-size:1.2rem;
}

}

</style>

</head>

<body>

<div class="container">

<div class="logo">
ESTÚDIO ESCRITA PLANEJADA
</div>

<div class="line"></div>

<h1>Em Breve</h1>

<p>
Estamos preparando novos lançamentos, conteúdos e projetos.<br><br>
Em breve, novidades para você.
</p>

<footer>
© 2026 Estúdio Escrita Planejada
</footer>

</div>

</body>
</html>
